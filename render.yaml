services:
  - type: web
    name: foodlens
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run_web.py
    envVars:
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: RENDER
        value: "true"
